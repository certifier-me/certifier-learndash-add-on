name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: PHP syntax check (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Lint PHP files
        run: find . -name '*.php' -not -path './node_modules/*' -print0 | xargs -0 -n1 php -l

  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Plugin Check derives the expected slug and text domain from the
      # directory name, so check a distribution copy named after the
      # wordpress.org slug instead of the repository root.
      - name: Build distribution copy
        run: |
          mkdir -p dist/certifier-learndash
          rsync -a --exclude-from=.distignore --exclude='.git' --exclude='dist' ./ dist/certifier-learndash/

      - name: Run Plugin Check
        uses: WordPress/plugin-check-action@v1
        with:
          build-dir: dist/certifier-learndash
